name: Deploy to Droplet

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup pnpm + Node ───────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      # ── 3. Install & Build ─────────────────────────────
      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        working-directory: backend
        run: pnpm build

      # ── 4. Deploy to server ────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'src' \
            --exclude '*.ts' \
            --exclude 'node_modules/.cache' \
            --exclude '.env*' \
            -e "ssh -i ~/.ssh/deploy_key" \
            backend/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/farmapp/

      - name: Install prod deps & run migrations
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            cd /var/www/farmapp
            
            # Install production dependencies
            pnpm install --prod --no-frozen-lockfile
            
            # Run migrations with all env vars
            NODE_ENV=production \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
            JWT_EXPIRES_IN="${{ vars.JWT_EXPIRES_IN || '24h' }}" \
            JWT_REFRESH_EXPIRES_IN="${{ vars.JWT_REFRESH_EXPIRES_IN || '7d' }}" \
            ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            ADMIN_NAME="${{ secrets.ADMIN_NAME }}" \
            FRONTEND_URL="${{ vars.FRONTEND_URL }}" \
            PORT="${{ vars.PORT || '8080' }}" \
            DB_DIALECT="${{ vars.DB_DIALECT || 'postgres' }}" \
            DB_LOG="${{ vars.DB_LOG || 'false' }}" \
            DB_SSL="${{ vars.DB_SSL || 'false' }}" \
            USE_MIGRATIONS="${{ vars.USE_MIGRATIONS || 'true' }}" \
            LOG_LEVEL="${{ vars.LOG_LEVEL || 'info' }}" \
            npx sequelize-cli db:migrate
            
            # Stop existing PM2 app
            pm2 stop farm-app 2>/dev/null || true
            pm2 delete farm-app 2>/dev/null || true
            
            # Start with all environment variables passed directly
            NODE_ENV=production \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
            JWT_EXPIRES_IN="${{ vars.JWT_EXPIRES_IN || '24h' }}" \
            JWT_REFRESH_EXPIRES_IN="${{ vars.JWT_REFRESH_EXPIRES_IN || '7d' }}" \
            ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            ADMIN_NAME="${{ secrets.ADMIN_NAME }}" \
            FRONTEND_URL="${{ vars.FRONTEND_URL }}" \
            PORT="${{ vars.PORT || '8080' }}" \
            DB_DIALECT="${{ vars.DB_DIALECT || 'postgres' }}" \
            DB_LOG="${{ vars.DB_LOG || 'false' }}" \
            DB_SSL="${{ vars.DB_SSL || 'false' }}" \
            USE_MIGRATIONS="${{ vars.USE_MIGRATIONS || 'true' }}" \
            LOG_LEVEL="${{ vars.LOG_LEVEL || 'info' }}" \
            pm2 start dist/server.js --name farm-app
            
            # Save PM2 configuration
            pm2 save
            
            # Show status
            pm2 status
            
            # Show recent logs
            pm2 logs farm-app --lines 50 --nostream
          ENDSSH
