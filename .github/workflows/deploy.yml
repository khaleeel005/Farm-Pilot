name: Deploy to Droplet

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup pnpm + Node ───────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      # ── 3. Install & Build ─────────────────────────────
      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        working-directory: backend
        run: pnpm build

      # ── 4. Setup SSH ───────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # ── 5. Sync files ──────────────────────────────────
      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'src' \
            --exclude '*.ts' \
            --exclude 'node_modules/.cache' \
            --exclude '.env*' \
            --exclude 'ecosystem.config.cjs' \
            -e "ssh -i ~/.ssh/deploy_key" \
            backend/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/farmapp/

      # ── 6. Write ecosystem config ──────────────────────
      # Done in a plain double-quoted SSH call so GitHub Actions
      # can interpolate ${{ secrets.* }} and ${{ vars.* }} freely.
      - name: Write ecosystem config to server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cat > /var/www/farmapp/ecosystem.config.cjs << 'EOF'
          module.exports = {
            apps: [{
              name: 'farm-app',
              script: 'dist/server.js',
              env: {
                NODE_ENV: 'production',
                DATABASE_URL: '${{ secrets.DATABASE_URL }}',
                JWT_SECRET: '${{ secrets.JWT_SECRET }}',
                JWT_REFRESH_SECRET: '${{ secrets.JWT_REFRESH_SECRET }}',
                JWT_EXPIRES_IN: '${{ vars.JWT_EXPIRES_IN || '24h' }}',
                JWT_REFRESH_EXPIRES_IN: '${{ vars.JWT_REFRESH_EXPIRES_IN || '7d' }}',
                ADMIN_USERNAME: '${{ secrets.ADMIN_USERNAME }}',
                ADMIN_PASSWORD: '${{ secrets.ADMIN_PASSWORD }}',
                ADMIN_NAME: '${{ secrets.ADMIN_NAME }}',
                FRONTEND_URL: '${{ vars.FRONTEND_URL }}',
                PORT: '${{ vars.PORT || '8080' }}',
                DB_DIALECT: '${{ vars.DB_DIALECT || 'postgres' }}',
                DB_LOG: '${{ vars.DB_LOG || 'false' }}',
                DB_SSL: '${{ vars.DB_SSL || 'false' }}',
                USE_MIGRATIONS: 'false',
                LOG_LEVEL: '${{ vars.LOG_LEVEL || 'info' }}'
              }
            }]
          };
          EOF"

      # ── 7. Install, migrate & restart ─────────────────
      - name: Install deps, run migrations & restart app
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            set -e
            cd /var/www/farmapp

            # Install all deps (sequelize-cli needed for migrations)
            pnpm install --no-frozen-lockfile

            # Load vars from ecosystem config and run migrations
            node -e "
              const config = require('./ecosystem.config.cjs');
              const { execSync } = require('child_process');
              const apps = config.apps;
              if (!Array.isArray(apps) || !apps[0] || !apps[0].env) {
                throw new Error('ecosystem.config.cjs must export { apps: [{ env: ... }] }');
              }
              Object.assign(process.env, apps[0].env, { USE_MIGRATIONS: 'true' });
              execSync('pnpm exec sequelize-cli db:migrate', { stdio: 'inherit' });
            "

            # Swap to prod-only deps for runtime
            pnpm install --prod --no-frozen-lockfile

            # Stop and delete existing PM2 process
            pm2 stop farm-app 2>/dev/null || true
            pm2 delete farm-app 2>/dev/null || true

            # Start via ecosystem file — PM2 stores all env vars from it
            pm2 start ecosystem.config.cjs
            pm2 save

            # Health check — fail the deploy if app didn't come up
            sleep 5
            pm2 show farm-app | grep -q "online" \
              || { echo "App failed to start"; pm2 logs farm-app --lines 50 --nostream; exit 1; }

            echo "Deploy successful"
            pm2 status
          ENDSSH
